<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff9d"/>
      <stop offset="100%" stop-color="#14b37d"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1f17"/>
      <stop offset="100%" stop-color="#042b21"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="184" height="184" rx="44" fill="url(#g2)"/>
  <rect x="8" y="8" width="184" height="184" rx="44" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.6"/>

  <!-- Inner glow -->
  <rect x="8" y="8" width="184" height="184" rx="44" fill="none" stroke="#00ff9d" stroke-width="1" opacity="0.2"/>

  <!-- Z shape - main letterform -->
  <path
    d="M52 58 L148 58 L88 102 L148 142 L52 142"
    stroke="url(#g1)"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Corner accent dots -->
  <circle cx="148" cy="58" r="8" fill="#00ff9d" filter="url(#glow)"/>
  <circle cx="52" cy="142" r="8" fill="#00ff9d" filter="url(#glow)"/>

  <!-- Small sparkle top right -->
  <path d="M165 32 L167 26 L169 32 L175 34 L169 36 L167 42 L165 36 L159 34 Z" fill="#00ff9d" opacity="0.7"/>
</svg>
